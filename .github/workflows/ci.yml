name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
      - run: go test -race ./...
      - run: go build ./cmd/search-service
      - run: docker build -t search-service:test .

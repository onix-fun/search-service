name: release
on:
  push:
    tags: ["v*"]
permissions: { contents: write, packages: write, security-events: write, id-token: write }
jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: "ghcr.io/${{ github.repository }}"
          tags: "type=ref,event=tag"
      - uses: docker/build-push-action@v6
        with: { context: ".", push: true, platforms: "linux/amd64,linux/arm64", tags: "${{ steps.meta.outputs.tags }}", labels: "${{ steps.meta.outputs.labels }}" }
      - uses: anchore/sbom-action@v0
        with: { image: "ghcr.io/${{ github.repository }}:${{ github.ref_name }}", artifact-name: sbom.spdx.json }
      - uses: aquasecurity/trivy-action@0.28.0
        with: { image-ref: "ghcr.io/${{ github.repository }}:${{ github.ref_name }}", format: sarif, output: trivy.sarif }
      - uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: trivy.sarif }

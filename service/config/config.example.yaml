service:
  name: search-service
  grpc_addr: ":9090"
  http_addr: ":8080"
  internal_auth_secret: "development-only-internal-secret"

redis:
  addr: "redis:6379"
  lease_key: "search:index:leader"
  lease_duration: "15s"
  lease_renew: "5s"

rabbitmq:
  url: "amqp://guest:guest@rabbitmq:5672/"
  dlq_exchange: "search.index.dlq"
  dlq_queue: "search.index.dlq.queue"
  prefetch_count: 100

meilisearch:
  host: "http://meilisearch:7700"
  api_key: "local-development-key"
  task_poll_interval: "100ms"
  task_timeout: "30s"

search:
  default_limit: 20
  max_limit: 100

enrichment:
  transliteration: true
  morphology: true
  synonyms_file: "config/synonyms.yaml"

indexer:
  shards: 8
  queue_size: 1000
  flush_interval: "500ms"
  max_retries: 5

collections:
  - name: subjects
    index: subjects
    exchange: "search.subjects.events"
    queue: "search.subjects.events.queue"
    routing_key: "search.subjects.events.queue"
    revision_prefix: "search:revision:subjects:"
    searchable_fields: [name, content]
    filterable_fields: [visibility, publication_status]
    sortable_fields: [updated_at]
    returnable_fields: [name, content, visibility, publication_status, updated_at]
  - name: blocks
    index: blocks
    exchange: "search.blocks.events"
    queue: "search.blocks.events.queue"
    routing_key: "search.blocks.events.queue"
    revision_prefix: "search:revision:blocks:"
    searchable_fields: [content]
    returnable_fields: [content, subject_id]
api_keys:
  - name: local
    value: "${SEARCH_API_KEY}"
    scopes: [search:read]
    collections: ["*"]

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: search
      POSTGRES_USER: search
      POSTGRES_PASSWORD: search
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U search -d search"]
      interval: 5s
      timeout: 3s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.45.1
    environment:
      MEILI_MASTER_KEY: local-development-key
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data

  search:
    build: .
    command: ["serve", "--role=all", "--config=config/config.example.yaml"]
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      SEARCH_DATABASE_URL: postgres://search:search@postgres:5432/search?sslmode=disable
      SEARCH_INTERNAL_AUTH_SECRET: local-development-internal-secret
      SEARCH_API_KEY: local-development-api-key
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started

  migrate-index:
    build: .
    command: ["migrate-index", "--config=config/config.example.yaml"]
    profiles: ["tools"]
    depends_on:
      meilisearch:
        condition: service_started

volumes:
  postgres-data:
  meili-data:

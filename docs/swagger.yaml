paths:
  /v1/collections/{collection}/search:
    post:
      consumes:
      - application/json
      description: Executes a search against a specific Meilisearch collection with
        filtering, sorting, and pagination.
      parameters:
      - description: Collection Name
        in: path
        name: collection
        required: true
        type: string
      - description: Search Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_onix-fun_search-service_internal_model.SearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_onix-fun_search-service_internal_model.SearchResult'
        "400":
          description: Invalid request
          schema:
            type: string
        "404":
          description: Unknown collection
          schema:
            type: string
        "503":
          description: Search backend unavailable
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Perform a search query
      tags:
      - search
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"

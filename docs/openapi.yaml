openapi: 3.1.0
info: { title: Search Service API, version: 1.0.0-rc.1 }
paths:
  /v1/collections/{collection}/search:
    post:
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: collection, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: { type: string }
                filter: {}
                sort: { type: array, items: { type: string } }
                offset: { type: integer, minimum: 0 }
                limit: { type: integer, minimum: 1 }
      responses:
        "200": { description: Ranked search hits }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer }
